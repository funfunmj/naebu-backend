<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>NAEBU ADMIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: #111;
  color: #eee;
}
input, textarea, select, button {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
}
button { cursor: pointer; }
.card {
  background: #222;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}
.hidden { display: none; }
</style>
</head>
<body>

<section id="loginSection">
  <h2>관리자 로그인</h2>
  <input id="passwordInput" type="password" placeholder="비밀번호" />
  <button id="loginBtn">로그인</button>
</section>

<section id="adminSection" class="hidden">
  <h2>문의 목록</h2>
  <button onclick="logout()">로그아웃</button>
  <button onclick="downloadExcel()">엑셀 다운로드</button>
  <div id="list"></div>
</section>

<!-- 🔽 포트폴리오 업로드 -->
<div class="card">
  <h2>포트폴리오 업로드</h2>

  <input id="title" placeholder="제목">
  <select id="category">
  <option value="주거">주거</option>
  <option value="상가">상가</option>
  <option value="사무실">사무실</option>
</select>
  <input type="file" id="file">

  <button onclick="uploadPortfolio()">업로드</button>
</div>

<!-- 🔽 포트폴리오 리스트 -->
<div class="card">
  <h2>포트폴리오 목록</h2>
  <div id="portfolio-list"></div>
</div>

<div class="card">
  <h2>HERO 슬라이드 업로드</h2>

  <input type="file" id="heroFile">

  <button onclick="uploadHero()">업로드</button>
</div>

<select id="filterStatus" onchange="loadEstimates()">
  <option value="">전체</option>
  <option value="대기">대기</option>
  <option value="진행중">진행중</option>
  <option value="완료">완료</option>
</select>

<script>
const loginSection = document.getElementById("loginSection");
const adminSection = document.getElementById("adminSection");
const listDiv = document.getElementById("list");
const passwordInput = document.getElementById("passwordInput");

/* =========================
   🔥 자동 로그인 체크
========================= */
window.addEventListener("DOMContentLoaded", async () => {
  const res = await fetch("https://naebu-backend.onrender.com/admin/check", {
    credentials: "include"
  });

  const data = await res.json();

 if (data.ok) {
  loginSection.classList.add("hidden");
  adminSection.classList.remove("hidden");
  loadEstimates();
  loadPortfolio(); // 🔥 추가
}
});

/* =========================
   로그인
========================= */
document.getElementById("loginBtn").addEventListener("click", async () => {
 const res = await fetch("https://naebu-backend.onrender.com/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ password: passwordInput.value })
  });

  const data = await res.json();

  if (data.ok) {
    loginSection.classList.add("hidden");
    adminSection.classList.remove("hidden");
    loadEstimates();
  } else {
    alert("비밀번호 오류");
  }
});

/* =========================
   로그아웃
========================= */
async function logout(){
  await fetch("https://naebu-backend.onrender.com/admin/logout", {
    method: "POST",
    credentials: "include"
  });

  location.reload();
}

/* =========================
   견적 목록 불러오기
========================= */
async function loadEstimates() {

  const status = document.getElementById("filterStatus").value;

  let url = "https://naebu-backend.onrender.com/estimates";
  if(status) url += "?status=" + status;

  const res = await fetch(url, {
    credentials: "include"
  });

  const data = await res.json();

  listDiv.innerHTML = "";

  data.forEach(item => {

    const color =
      item.status === "대기" ? "#444" :
      item.status === "진행중" ? "#2a4d7a" :
      "#2e7d32";

    const div = document.createElement("div");
    div.className = "card";
    div.style.borderLeft = `5px solid ${color}`;

    div.innerHTML = `
      <b>이름:</b> ${item.name}<br>
      <b>전화:</b> ${item.phone}<br>
      <b>예산:</b> ${item.budget || ""}<br>
      <b>공간:</b> ${item.space || ""}<br>
      <b>내용:</b> ${item.message || ""}<br><br>

      <b>상태:</b>
      <select id="status-${item.id}" onchange="updateEstimate('${item.id}')">
        <option value="대기" ${item.status=="대기"?"selected":""}>대기</option>
        <option value="진행중" ${item.status=="진행중"?"selected":""}>진행중</option>
        <option value="완료" ${item.status=="완료"?"selected":""}>완료</option>
      </select>

      <br><br>

      <b>메모:</b><br>
      <textarea id="memo-${item.id}"
        onblur="autoSave('${item.id}')">${item.memo || ""}</textarea>

      <button onclick="deleteEstimate('${item.id}')" style="background:red;color:white;">
삭제
</button>
      <hr>
    `;

    listDiv.appendChild(div);

  });

}

/* =========================
   상태 + 메모 업데이트
========================= */
async function updateEstimate(id){
  const memo = document.getElementById("memo-"+id).value;
  const status = document.getElementById("status-"+id).value;

  await fetch("https://naebu-backend.onrender.com/estimates/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ status, memo })
  });

  alert("저장 완료");
}
async function deleteEstimate(id) {
  if (!confirm("정말 삭제하시겠습니까?")) return;

 await fetch("https://naebu-backend.onrender.com/estimates/" + id, {
    method: "DELETE",
    credentials: "include"
  });

  alert("삭제 완료");
  loadEstimates();
}
function downloadExcel() {
 window.location.href = "https://naebu-backend.onrender.com/admin/export";
}

async function autoSave(id){
  const memo = document.getElementById("memo-"+id).value;
  const status = document.getElementById("status-"+id).value;

  await fetch("/estimates/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ status, memo })
  });
}

/* =========================
   포트폴리오 업로드
========================= */
async function uploadPortfolio(){
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const file = document.getElementById("file").files[0];

  if(!file){
    alert("파일 선택해라");
    return;
  }

  const formData = new FormData();
  formData.append("title", title);
  formData.append("category", category);
  formData.append("file", file); // 🔥 중요

  await fetch("https://naebu-backend.onrender.com/upload/portfolio", {
    method: "POST",
    credentials: "include", // 🔥 관리자 인증 필요
    body: formData
  });

  alert("업로드 완료");
  loadPortfolio();
}


/* =========================
   포트폴리오 불러오기
========================= */
async function loadPortfolio(){
  const res = await fetch("https://naebu-backend.onrender.com/portfolio"); // 🔥 여기 중요
  const data = await res.json();

  const container = document.getElementById("portfolio-list");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div style="margin-bottom:10px;">
        <img src="${item.image_url}" width="150"><br>
        <b>${item.title}</b><br>
        <span>${item.category}</span>
      </div>
    `;
  });
}

async function uploadHero(){
  const file = document.getElementById("heroFile").files[0];

  if(!file){
    alert("파일 선택해라");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

   await fetch("https://naebu-backend.onrender.com/upload/hero", {
    method: "POST",
    credentials: "include",
    body: formData
  });

  alert("HERO 업로드 완료");
}

</script>

</body>
</html>
